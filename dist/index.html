<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" id="theme-color-meta" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M8 3.1V7a4 4 0 0 0 8 0V3.1'/%3E%3Cpath d='m9 15-1-1'/%3E%3Cpath d='m15 15 1-1'/%3E%3Cpath d='M9 19c-2.8 0-5-2.2-5-5v-4a8 8 0 0 1 16 0v4c0 2.8-2.2 5-5 5Z'/%3E%3Cpath d='m8 19-2 3'/%3E%3Cpath d='m16 19 2 3'/%3E%3C/svg%3E"
    />
    <title>TestPro</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        const root = document.documentElement;

        const savedMode =
          localStorage.getItem("themeMode") || localStorage.getItem("theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const mode =
          savedMode === "dark"
            ? "dark"
            : savedMode === "light"
            ? "light"
            : prefersDark
            ? "dark"
            : "light";

        const light = {
          "--bg-base": "#f8fafc",
          "--bg-surface": "#ffffff",
          "--bg-card": "#f1f5f9",
          "--bg-nav": "rgba(255,255,255,0.85)",
          "--border-color": "rgba(0,0,0,0.06)",
          "--text-primary": "#0f172a",
          "--text-secondary": "#334155",
          "--text-muted": "#64748b",
          "--input-bg": "#ffffff",
          "--input-border": "rgba(0,0,0,0.10)",
          "--input-text": "#0f172a",
          "--glass-bg": "rgba(0,0,0,0.03)",
          "--glass-border": "rgba(0,0,0,0.06)",
          "--grad-from": "#e0e7ff",
          "--grad-via": "#f0f9ff",
          "--grad-to": "#e0f2fe",
          "--color-brand": "#2563eb",
          "--color-brand-hover": "#3b82f6",
          "--color-brand-bg": "rgba(37,99,235,0.10)",
          "--color-pass": "#22c55e",
          "--color-fail": "#ef4444",
          "--color-pend": "#f59e0b",
          "--color-warn": "#f59e0b",
          "--color-my-lock": "#22d3ee",
          "--color-other-lock": "#f59e0b",
          "--neon-cyan": "34, 211, 238",
          "--neon-amber": "245, 158, 11",
        };

        const dark = {
          "--bg-base": "#030712",
          "--bg-surface": "#111827",
          "--bg-card": "#1f2937",
          "--bg-nav": "rgba(17,24,39,0.80)",
          "--border-color": "rgba(255,255,255,0.05)",
          "--text-primary": "#f9fafb",
          "--text-secondary": "#d1d5db",
          "--text-muted": "#6b7280",
          "--input-bg": "#1f2937",
          "--input-border": "rgba(255,255,255,0.10)",
          "--input-text": "#f3f4f6",
          "--glass-bg": "rgba(255,255,255,0.05)",
          "--glass-border": "rgba(255,255,255,0.10)",
          "--grad-from": "#1e1b4b",
          "--grad-via": "#0f172a",
          "--grad-to": "#1e3a5f",
          "--color-brand": "#3b82f6",
          "--color-brand-hover": "#60a5fa",
          "--color-brand-bg": "rgba(59,130,246,0.15)",
          "--color-pass": "#22c55e",
          "--color-fail": "#ef4444",
          "--color-pend": "#f59e0b",
          "--color-warn": "#f59e0b",
          "--color-my-lock": "#22d3ee",
          "--color-other-lock": "#f59e0b",
          "--neon-cyan": "34, 211, 238",
          "--neon-amber": "245, 158, 11",
        };

        const brandDefaults = {
          "--brand-50": "#eff6ff",
          "--brand-100": "#dbeafe",
          "--brand-200": "#bfdbfe",
          "--brand-300": "#93c5fd",
          "--brand-400": "#60a5fa",
          "--brand-500": "#3b82f6",
          "--brand-600": "#2563eb",
          "--brand-700": "#1d4ed8",
          "--brand-800": "#1e40af",
          "--brand-900": "#1e3a8a",
        };

        const glassDefaults = {
          "--glass-blur": "28px",
          "--glass-saturation": "180%",
          "--glass-brightness": "1.06",
          "--glass-bg-opacity": "40%",
          "--glass-border-opacity": "55%",
          "--glass-nav-bg-opacity": "75%",
          "--glass-popup-bg-opacity": "72%",
          "--glass-card-bg-opacity": "86%",
          "--glass-card-border-opacity": "80%",
          "--backdrop-dim-opacity": "55%",
        };

        const tokens = mode === "dark" ? dark : light;

        const applyObject = (obj) => {
          for (const [k, v] of Object.entries(obj)) {
            root.style.setProperty(k, v);
          }
        };

        applyObject(tokens);
        applyObject(brandDefaults);
        applyObject(glassDefaults);

        try {
          const storedBrand = JSON.parse(
            localStorage.getItem("themeEditorBrandPalette") || "null"
          );
          if (storedBrand && typeof storedBrand === "object") {
            for (const [shade, value] of Object.entries(storedBrand)) {
              if (value) root.style.setProperty(`--brand-${shade}`, value);
            }
          }
        } catch {}

        try {
          const storedStatus = JSON.parse(
            localStorage.getItem("themeEditorStatusColors") || "null"
          );
          if (storedStatus && typeof storedStatus === "object") {
            for (const [key, value] of Object.entries(storedStatus)) {
              if (value) root.style.setProperty(`--color-${key}`, value);
            }
          }
        } catch {}

        try {
          const storedGlass = JSON.parse(
            localStorage.getItem("themeEditorGlass") || "null"
          );
          if (storedGlass && typeof storedGlass === "object") {
            if (storedGlass.blur != null) {
              root.style.setProperty("--glass-blur", `${storedGlass.blur}px`);
            }
            if (storedGlass.saturation != null) {
              root.style.setProperty(
                "--glass-saturation",
                `${storedGlass.saturation}%`
              );
            }
            if (storedGlass.brightness != null) {
              root.style.setProperty(
                "--glass-brightness",
                `${(storedGlass.brightness / 100).toFixed(2)}`
              );
            }
            if (storedGlass.bgOpacity != null) {
              root.style.setProperty(
                "--glass-bg-opacity",
                `${storedGlass.bgOpacity}%`
              );
            }
            if (storedGlass.borderOpacity != null) {
              root.style.setProperty(
                "--glass-border-opacity",
                `${storedGlass.borderOpacity}%`
              );
            }
            if (storedGlass.navBgOpacity != null) {
              root.style.setProperty(
                "--glass-nav-bg-opacity",
                `${storedGlass.navBgOpacity}%`
              );
            }
            if (storedGlass.popupBgOpacity != null) {
              root.style.setProperty(
                "--glass-popup-bg-opacity",
                `${storedGlass.popupBgOpacity}%`
              );
            }
            if (storedGlass.cardBgOpacity != null) {
              root.style.setProperty(
                "--glass-card-bg-opacity",
                `${storedGlass.cardBgOpacity}%`
              );
            }
            if (storedGlass.cardBorderOpacity != null) {
              root.style.setProperty(
                "--glass-card-border-opacity",
                `${storedGlass.cardBorderOpacity}%`
              );
            }
            if (storedGlass.backdropDimOpacity != null) {
              root.style.setProperty(
                "--backdrop-dim-opacity",
                `${storedGlass.backdropDimOpacity}%`
              );
            }
          }
        } catch {}

        try {
          const overrides = JSON.parse(
            localStorage.getItem("themeEditorOverrides") || "null"
          );
          const activeOverrides = overrides && overrides[mode];
          if (activeOverrides && typeof activeOverrides === "object") {
            const cssVarMap = {
              bgBase: "--bg-base",
              bgSurface: "--bg-surface",
              bgCard: "--bg-card",
              bgNav: "--bg-nav",
              borderColor: "--border-color",
              textPrimary: "--text-primary",
              textSecondary: "--text-secondary",
              textMuted: "--text-muted",
              inputBg: "--input-bg",
              inputBorder: "--input-border",
              inputText: "--input-text",
              glassBg: "--glass-bg",
              glassBorder: "--glass-border",
              gradFrom: "--grad-from",
              gradVia: "--grad-via",
              gradTo: "--grad-to",
              colorBrand: "--color-brand",
              colorBrandHover: "--color-brand-hover",
              colorBrandBg: "--color-brand-bg",
              colorPass: "--color-pass",
              colorFail: "--color-fail",
              colorPend: "--color-pend",
              colorWarn: "--color-warn",
            };

            for (const [key, value] of Object.entries(activeOverrides)) {
              const cssVar = cssVarMap[key];
              if (cssVar && value) root.style.setProperty(cssVar, value);
            }
          }
        } catch {}

        root.classList.remove("light", "dark");
        root.classList.add(mode);
        root.setAttribute("data-theme", mode);

        const meta = document.getElementById("theme-color-meta");
        if (meta) {
          meta.setAttribute("content", tokens["--bg-base"]);
        }
      })();
    </script>

    <style>
      html {
        visibility: visible;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        margin: 0;
        background-color: var(--bg-base);
        color: var(--text-primary);
      }
    </style>

    <base target="_blank" />
    <script type="module" crossorigin src="/assets/index-egVlilvW.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bb2ktNSE.css">

  <body>
    <div id="root"></div>
  </body>
</html>
